<!DOCTYPE html>
<html lang="en">
<head>
    <title>AI Sentiment Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-[400px] text-center">

        <h1 class="text-2xl font-bold mb-4 text-gray-800">
            Sentiment Analyzer
        </h1>

        <input 
            id="text"
            type="text" 
            placeholder="Enter your review..."
            class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-purple-500"
        >

        <button 
            onclick="analyze()"
            class="w-full bg-purple-600 text-white p-3 rounded-lg hover:bg-purple-700 transition"
        >
            Analyze
        </button>

        <div id="result" class="mt-5 text-lg font-semibold"></div>

    </div>

<script>
async function analyze() {
    let text = document.getElementById("text").value;

    if (text.trim() === "") {
        document.getElementById("result").innerText = "Please enter a review!";
        return;
    }

    try {
        let response = await fetch("http://127.0.0.1:5000/predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({text: text})
        });

        let data = await response.json();

        let resultText = data.sentiment + " (Confidence: " + (data.confidence * 100).toFixed(2) + "%)";

        let color = "black";

        if (data.sentiment === "positive") color = "green";
        else if (data.sentiment === "negative") color = "red";
        else color = "orange";

        document.getElementById("result").innerText = resultText;
        document.getElementById("result").style.color = color;

    } catch (error) {
        document.getElementById("result").innerText = "Error connecting to server!";
    }
}
</script>

</body>
</html>
